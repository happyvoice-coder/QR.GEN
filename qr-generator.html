<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .wrap { width: 100%; max-width: 480px; }

  header { margin-bottom: 40px; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  select:focus { border-color: var(--accent); }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .color-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .color-wrap:focus-within { border-color: var(--accent); }

  input[type="color"] {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    padding: 0;
    cursor: pointer;
    border-radius: 2px;
  }

  .color-val { font-size: 13px; color: var(--text); flex: 1; text-transform: uppercase; }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 24px;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.99); }

  #preview-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  #preview-area.visible { display: flex; }

  .preview-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    align-self: flex-start;
  }

  .canvas-container {
    position: relative;
    border-radius: 2px;
    overflow: hidden;
  }

  .canvas-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(45deg, #333 25%, transparent 25%),
      linear-gradient(-45deg, #333 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #333 75%),
      linear-gradient(-45deg, transparent 75%, #333 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
    background-color: #1e1e1e;
    z-index: 0;
  }

  #output-canvas {
    position: relative;
    z-index: 1;
    display: block;
    max-width: 320px;
    max-height: 320px;
  }

  #qr-hidden { position: absolute; left: -9999px; top: -9999px; }

  .dl-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    margin-bottom: 0;
    font-size: 13px;
    padding: 11px;
  }

  .dl-btn:hover { background: rgba(232,255,71,0.08); opacity: 1; }

  .size-note { font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>QR<span>.</span>gen</h1>
    <p class="sub">PNG с прозрачным фоном</p>
  </header>

  <div class="field">
    <label>URL или текст</label>
    <input type="text" id="url-input" placeholder="https://example.com">
  </div>

  <div class="row">
    <div class="field">
      <label>Цвет модулей</label>
      <div class="color-wrap">
        <input type="color" id="fg-color" value="#000000">
        <span class="color-val" id="fg-val">#000000</span>
      </div>
    </div>
    <div class="field">
      <label>Размер (px)</label>
      <input type="number" id="size-input" value="512" min="128" max="2048" step="64">
    </div>
  </div>

  <div class="field">
    <label>Коррекция ошибок</label>
    <select id="ec-level">
      <option value="L">L — низкая (7%)</option>
      <option value="M" selected>M — средняя (15%)</option>
      <option value="Q">Q — высокая (25%)</option>
      <option value="H">H — максимальная (30%)</option>
    </select>
  </div>

  <br>
  <button onclick="generate()">Сгенерировать</button>

  <div id="preview-area">
    <span class="preview-label">Предпросмотр (шахматка = прозрачность)</span>
    <div class="canvas-container">
      <canvas id="output-canvas"></canvas>
    </div>
    <p class="size-note" id="size-note"></p>
    <button class="dl-btn" onclick="download()">↓ Скачать PNG</button>
  </div>
</div>

<div id="qr-hidden"></div>

<script>
const fgInput = document.getElementById('fg-color');
const fgVal   = document.getElementById('fg-val');
fgInput.addEventListener('input', () => { fgVal.textContent = fgInput.value.toUpperCase(); });

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3), 16),
    parseInt(hex.slice(3,5), 16),
    parseInt(hex.slice(5,7), 16)
  ];
}

function generate() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { alert('Введите URL или текст'); return; }

  const size = Math.max(128, Math.min(2048, parseInt(document.getElementById('size-input').value) || 512));
  const ec   = document.getElementById('ec-level').value;
  const fg   = document.getElementById('fg-color').value;

  const hidden = document.getElementById('qr-hidden');
  hidden.innerHTML = '';

  const baseSize = 256;

  try {
    // Always render black-on-white internally.
    // This guarantees white = background, dark = module — regardless of chosen color.
    // We recolor modules to the user's chosen color in the pixel pass below.
    new QRCode(hidden, {
      text: url,
      width: baseSize,
      height: baseSize,
      colorDark:  '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel[ec]
    });
  } catch(e) {
    alert('Ошибка генерации: ' + e.message);
    return;
  }

  setTimeout(() => {
    const srcCanvas = hidden.querySelector('canvas');
    if (!srcCanvas) { alert('Не удалось создать QR'); return; }

    const tmp = document.createElement('canvas');
    tmp.width  = baseSize;
    tmp.height = baseSize;
    const ctx  = tmp.getContext('2d');
    ctx.drawImage(srcCanvas, 0, 0);

    const imgData = ctx.getImageData(0, 0, baseSize, baseSize);
    const d = imgData.data;
    const [tr, tg, tb] = hexToRgb(fg);

    for (let i = 0; i < d.length; i += 4) {
      if (d[i] > 200 && d[i+1] > 200 && d[i+2] > 200) {
        // White pixel = background → transparent
        d[i+3] = 0;
      } else {
        // Dark pixel = module → apply chosen color
        d[i]   = tr;
        d[i+1] = tg;
        d[i+2] = tb;
        d[i+3] = 255;
      }
    }
    ctx.putImageData(imgData, 0, 0);

    // Scale to requested size with nearest-neighbour (crisp pixels)
    const out    = document.getElementById('output-canvas');
    out.width    = size;
    out.height   = size;
    const outCtx = out.getContext('2d');
    outCtx.clearRect(0, 0, size, size);
    outCtx.imageSmoothingEnabled = false;
    outCtx.drawImage(tmp, 0, 0, size, size);

    document.getElementById('preview-area').classList.add('visible');
    document.getElementById('size-note').textContent = `${size} × ${size} px`;
    out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 200);
}

function download() {
  const canvas = document.getElementById('output-canvas');
  const a = document.createElement('a');
  a.download = 'qr-code.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
